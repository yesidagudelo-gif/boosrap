<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Inventario Dinámico</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<h2>Mini Inventario</h2>
<i class="bi bi-cart">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cart" viewBox="0 0 16 16">
    <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l1.313 7h8.17l1.313-7H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
  </svg>
</i>
<input type="text" id="nombre" placeholder="Nombre del producto">
<input type="number" id="input-stock" placeholder="Cantidad de stock">
<button id="btn-agregar">Agregar Nuevo Producto</button>
<div id="contenedor-productos"></div>
<script>
  const inventario = [{nombre: "balon puskas", stock: 5}];
  const contenedor = document.getElementById('contenedor-productos');
  const botonAgregar = document.getElementById('btn-agregar');

  function mostrar(){
    contenedor.innerHTML = "";
    inventario.forEach(producto => {
      const claseStock = producto.stock < 5 ? "alerta" : "";
      const tarjeta = `
        <div class="producto">
          <h3>${producto.nombre}</h3>
          <p class="${claseStock}">Stock: ${producto.stock}</p>
        </div>
      `;
      contenedor.innerHTML += tarjeta;
    });
  }
  botonAgregar.addEventListener('Click', () => {
    inventario.push((nombre: "balon golty", stock: 8});
  mostrar();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
